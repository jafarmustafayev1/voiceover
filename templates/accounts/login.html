{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-4 text-center">Kirish</h3>
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-medium">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Kirish</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Akkaunt yo'qmi? <a href="{% url 'register' %}">Ro'yxatdan o'tish</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
