{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-4">Mening profilim</h3>

                {% if profile.audio_sample %}
                    <div class="mb-4">
                        <label class="form-label fw-medium">Joriy audio namuna:</label>
                        <audio controls class="w-100">
                            <source src="{{ profile.audio_sample.url }}" type="audio/mpeg">
                        </audio>
                    </div>
                {% endif %}

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-medium">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Saqlash</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
